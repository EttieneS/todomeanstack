<div>
  <form [formGroup]="userdetailsForm" (ngSubmit)="addUser(userdetailsForm)">
    <mat-form-field appearance="legacy">
      <mat-label>User Name</mat-label>
      <input matInput
        formControlName="username"
        id="username"
        name="username"
        placeholder="User Name">
      <mat-hint>Enter the user's name</mat-hint>
    </mat-form-field>
    <mat-card-actions>
      <button mat-raised-button color="primary" type="submit">Add User</button>
    </mat-card-actions>
  </form>
</div>
